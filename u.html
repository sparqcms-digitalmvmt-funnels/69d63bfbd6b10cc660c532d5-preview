sessionStorage.setItem("test", true);

const ALLOWED_AFFILIATE_IDS = [];

let nextPageSlug = null;

function handleUrlParams(params) {
  const specialParams = ["p_dc", "p_tenbucksoff", "p_freeship", "p_freegift"];
  const allowedDcValues = ["5", "10", "15", "20", "25"];
  const currentAffId = params.get("affid") || sessionStorage.getItem("affid");
  const discountsAllowed =
    ALLOWED_AFFILIATE_IDS.length === 0 ||
    (currentAffId !== null && ALLOWED_AFFILIATE_IDS.includes(currentAffId));
  if (!discountsAllowed) {
    specialParams.forEach((key) => sessionStorage.removeItem(key));
  }
  params.forEach((value, key) => {
    const paramKey = `p_${key}`;
    if (specialParams.includes(paramKey)) {
      if (!discountsAllowed) return;
      if (paramKey === "p_dc" && !allowedDcValues.includes(value)) return;
      sessionStorage.setItem(paramKey, value);
    } else {
      sessionStorage.setItem(key, value);
    }
  });
}

      p = p.replace(/\/+$/, '');
      p = p.replace(/\/index.html$/, '');
      p = p.replace(/^\/+/, ''); p = p.replace(/^69d63bfbd6b10cc660c532d5-preview\/?/, '');
      return p;
    } catch (e) {
      console.error('Error normalizing path', e);
      return '';
    }
  };
  const pathname = window.location.pathname;
  const cp = normalizePath(pathname || '/');

}

const route = async () => {
  if (localStorage.getItem('sK_r')) return JSON.parse(localStorage.getItem('sK_r'));
  const sessionId = MVMT.getSessionId() || localStorage.getItem("mvmt_session_id") || "";
  const url = 'https://func-ab-test-events-dev-001.azurewebsites.net/api/checkRoute?id=69d63bfbd6b10cc660c532d5&v=177643585412789&sessionId='+sessionId;
  try {
    const response = await fetch(url);
    if (!response.ok) throw new Error('Network response was not ok');
    const data = await response.json();
    localStorage.setItem('sK_r', JSON.stringify(data));
    return data;
  } catch (error) {
    console.error('There was a problem with the fetch operation:', error);
    throw error;
  }
}
const nextPage = async () => {
  let cr = await route();
  if (!cr) throw new Error('Route not found');
  const normalizePath = (rawPath) => {
    if (!rawPath) return '';
    try {
      let p = String(rawPath);
      p = p.split('?')[0].split('#')[0];
      p = p.replace(/\/+$/, '');
      p = p.replace(/\/index.html$/, '');
      p = p.replace(/^\/+/, ''); p = p.replace(/^69d63bfbd6b10cc660c532d5-preview\/?/, '');
      return p;
    } catch (e) {
      console.error('Error normalizing path', e);
      return '';
    }
  };
  const pathname = window.location.pathname;
  const cp = normalizePath(pathname || '/');
  let nr = cr.find((r) => r.page === cp);
  if (!nr) {
    try {
      localStorage.removeItem('sK_r');
    } catch (e) {
      // ignore storage errors
    }
    cr = await route();
    if (!cr) return '';
    nr = cr.find((r) => r.page === cp);
  }
  const urlParams = new URLSearchParams(window.location.search);
  if (!nr) return '';
  const baseNext = pathname.endsWith("/index.html") ? nr.next + "/index.html" : nr.next || '';
  const withQuery = urlParams && urlParams.toString()
    ? baseNext + '?' + urlParams.toString()
    : baseNext;
  const absolute = withQuery && !withQuery.startsWith('/') ? '/69d63bfbd6b10cc660c532d5-preview/' + withQuery : withQuery;
  return absolute;
}

  if (nextPageSlug === null || nextPageSlug.length === 0) {

    const ctaButtons = document.querySelectorAll("[data-cta-button]");
    ctaButtons.forEach((button) => {

});

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      setTimeout(() => {
        const cookiesBanner = document.querySelector("[data-cookie-banner]");
        const cookieAcceptButton = document.querySelector("[data-cookie-accept-button]");
        const cookieRejectButton = document.querySelector("[data-cookie-reject-button]");

        if (!(cookiesBanner && cookieAcceptButton && cookieRejectButton)) return;

        const cookieDependentScripts = [];
        const cookiesAnswer = sessionStorage.getItem("cookiesAnswer");

        if (cookiesAnswer === "accepted" || cookiesAnswer === "rejected") {
          cookiesBanner.style.display = "none";
          injectTrackingScripts();
        } else {
          cookiesBanner.style.display = "flex";
        }

        cookieAcceptButton.addEventListener("click", () => {
          sessionStorage.setItem("cookiesAnswer", "accepted");
          cookiesBanner.style.display = "none";
          if (cookieDependentScripts.length > 0) injectTrackingScripts()
        });

        cookieRejectButton.addEventListener("click", () => {
          sessionStorage.setItem("cookiesAnswer", "rejected");
          cookiesBanner.style.display = "none";
        });

        function injectTrackingScripts() {
          cookieDependentScripts.forEach((script) => {
            if (script.src) {
              const scriptElement = document.createElement("script");
              scriptElement.src = script.src;
              scriptElement.async = true;
              document.head.appendChild(scriptElement);
            } else if (script.text) {
              const scriptElement = document.createElement("script")
              scriptElement.innerHTML = script.text;
              document.head.appendChild(scriptElement);
            }
          })
        }
      }, 500);
    });
  </script>
